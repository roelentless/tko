name: Build

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ (matrix.goos == 'darwin') && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ github.ref_name }}"
          LDFLAGS="-s -w -X tko/internal/version.Version=${VERSION}"

          # install.sh uses "macos" not "darwin"
          PLATFORM="$GOOS"
          if [ "$GOOS" = "darwin" ]; then PLATFORM="macos"; fi

          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

          go build -ldflags "$LDFLAGS" -o "tko${EXT}" ./cmd/tko/

          if [ "$GOOS" = "windows" ]; then
            zip "tko-${PLATFORM}-${GOARCH}.zip" tko.exe
          else
            tar czf "tko-${PLATFORM}-${GOARCH}.tar.gz" tko
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: tko-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            tko-*.tar.gz
            tko-*.zip
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            tko-*
